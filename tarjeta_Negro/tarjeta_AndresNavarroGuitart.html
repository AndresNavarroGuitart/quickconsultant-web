<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Andrés Navarro Guitart — Tarjeta Digital</title>
  <meta name="description" content="Especialista en Innovación, Procesos y Transformación Digital" />
  <meta property="og:title" content="Andrés Navarro Guitart" />
  <meta property="og:description" content="Especialista en Innovación, Procesos y Transformación Digital · Quick Consultant" />
  <meta property="og:image" content="foto_andres.jpeg.jpeg" />
  <meta property="og:type" content="profile" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink:   #e91e8c;
      --purple: #7b2d8b;
      --grad:   linear-gradient(135deg, #e91e8c 0%, #7b2d8b 100%);
      --dark:   #111118;
      --text:   #1a1a2e;
      --muted:  #6b7280;
      --light:  #f9f9fb;
      --white:  #ffffff;
      --border: #f0f0f5;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Background orbs (match QC hero) */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 520px; height: 520px;
      top: -150px; right: -150px;
      background: linear-gradient(135deg, rgba(233,30,140,.11) 0%, rgba(123,45,139,.11) 100%);
    }
    .bg-orb-2 {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      background: linear-gradient(135deg, rgba(233,30,140,.07) 0%, rgba(123,45,139,.07) 100%);
    }

    /* ───── CARD ───── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.12), 0 4px 16px rgba(233,30,140,.06);
      overflow: visible;
      position: relative;
      z-index: 1;
    }

    /* Gradient header */
    .card-header {
      background: var(--grad);
      border-radius: 28px 28px 0 0;
      padding: 26px 24px 0;
      position: relative;
      min-height: 148px;
    }

    /* Dot grid decoration */
    .dot-grid {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(6, 6px);
      gap: 7px;
      pointer-events: none;
    }
    .dot-grid span {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,.38);
      display: block;
    }
    .dots-tr { top: 20px; right: 72px; }
    .dots-bl { bottom: 40px; left: 18px; opacity: .6; }

    /* Plus decorations */
    .plus {
      position: absolute;
      font-weight: 300;
      color: rgba(255,255,255,.4);
      font-size: 1.6rem;
      line-height: 1;
      pointer-events: none;
    }
    .plus-1 { top: 18px; left: 24px; }
    .plus-2 { bottom: 50px; right: 22px; }

    /* QC brand logo in header — white pill badge */
    .header-brand {
      position: absolute;
      top: 16px; left: 16px;
      display: flex;
      align-items: center;
      text-decoration: none;
      background: rgba(255,255,255,.96);
      border-radius: 100px;
      padding: 6px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      transition: opacity .2s, transform .2s;
    }
    .header-brand:hover { opacity: .9; transform: translateY(-1px); }
    .header-brand img {
      height: 22px;
      width: auto;
    }

    /* White wave at bottom of header */
    .card-wave {
      background: var(--grad);
    }
    .card-wave-inner {
      background: var(--white);
      border-radius: 50% 50% 0 0 / 44px 44px 0 0;
      height: 44px;
    }

    /* Avatar — overlaps header/body boundary */
    .avatar-wrap {
      position: absolute;
      bottom: -148px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }
    .avatar-ring {
      width: 232px; height: 232px;
      border-radius: 50%;
      background: var(--grad);
      padding: 4px;
      box-shadow: 0 10px 36px rgba(233,30,140,.35);
    }
    .avatar-ring-inner {
      width: 224px; height: 224px;
      border-radius: 50%;
      background: var(--white);
      padding: 4px;
      overflow: hidden;
    }
    .avatar-ring-inner img {
      width: 216px; height: 216px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .avatar-initials {
      width: 216px; height: 216px;
      border-radius: 50%;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      letter-spacing: .02em;
    }

    /* Card body */
    .card-body {
      background: var(--white);
      border-radius: 0 0 28px 28px;
      padding: 120px 28px 14px;
      text-align: center;
    }

    .card-name {
      font-size: 1.45rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 7px;
    }

    .card-role {
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .card-tagline {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 22px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    /* Contact rows */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
      margin-bottom: 4px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 13px;
      border-radius: 13px;
      background: var(--light);
      text-decoration: none;
      color: var(--text);
      border: 1.5px solid transparent;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .contact-item:hover {
      background: #fdf0f8;
      border-color: rgba(233,30,140,.2);
      transform: translateX(3px);
    }
    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg {
      width: 16px; height: 16px;
    }
    .contact-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      line-height: 1;
      margin-bottom: 3px;
    }
    .contact-value {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 14px 20px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity .2s, transform .2s, border-color .2s, color .2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--grad);
      color: white;
      box-shadow: 0 6px 20px rgba(233,30,140,.3);
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-outline:hover {
      border-color: var(--pink);
      color: var(--pink);
      transform: translateY(-1px);
    }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Icon-only row */
    .icon-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    .icon-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      transition: border-color .2s, color .2s, transform .2s;
      flex-shrink: 0;
    }
    .icon-btn svg { width: 20px; height: 20px; }
    .icon-btn:hover {
      border-color: var(--pink);
      color: var(--pink);
      transform: translateY(-2px);
    }

    /* QR toggle */
    .qr-section { margin-top: 10px; }
    .qr-toggle {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      transition: color .2s;
    }
    .qr-toggle:hover { color: var(--pink); }
    .qr-box {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 18px 0 4px;
      gap: 10px;
      animation: fadeIn .25s ease;
    }
    .qr-box.visible { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    #qrcode {
      border-radius: 14px;
      overflow: hidden;
      padding: 10px;
      background: white;
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
    }
    .qr-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
    }

    /* Footer */
    .card-footer {
      padding: 10px 28px 14px;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 0;
    }
    .card-footer a {
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      transition: color .2s;
    }
    .card-footer a:hover { color: var(--pink); }
    .card-footer a:hover img { opacity: 1 !important; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: white;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

  <script>
    /* ── Config ──────────────────────────────────────────────────
       When the card is hosted online, replace QR_URL with the
       full card URL (e.g. "https://tu-dominio.com/tarjeta.html")
       ──────────────────────────────────────────────────────────── */
    const QR_URL = 'https://andresnavarroguitart.github.io/quickconsultant-web/tarjeta_Negro/tarjeta_AndresNavarroGuitart.html';

    let qrGenerated = false;

    function toggleQR() {
      const box = document.getElementById('qr-box');
      const btn = document.getElementById('qr-btn');
      box.classList.toggle('visible');

      const qrIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/></svg>`;
      if (box.classList.contains('visible')) {
        btn.innerHTML = qrIcon + ' Ocultar QR';
        if (!qrGenerated) {
          new QRCode(document.getElementById('qrcode'), {
            text: QR_URL,
            width: 180,
            height: 180,
            colorDark: '#1a1a2e',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
          qrGenerated = true;
        }
      } else {
        btn.innerHTML = qrIcon + ' Mostrar QR';
      }
    }

    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Andrés Navarro Guitart',
        'N:Navarro Guitart;Andrés;;;',
        'ORG:Quick Consultant',
        'TITLE:Especialista en Innovación, Procesos y Transformación Digital',
        'TEL;TYPE=CELL,VOICE:+5493513344814',
        'EMAIL;TYPE=INTERNET:andresnavarro.di@gmail.com',
        'URL:https://www.linkedin.com/in/andr%C3%A9snavarroguitart/',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'Andres_Navarro_Guitart.vcf';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Contacto descargado ✓');
    }

    function shareCard() {
      const text = '👋 Te comparto mi tarjeta digital\n\n' +
        'Andrés Navarro Guitart\n' +
        'Especialista en Innovación, Procesos y Transformación Digital';

      if (navigator.share) {
        navigator.share({
          title: 'Andrés Navarro Guitart',
          text: text,
          url: window.location.href !== 'about:blank' ? window.location.href : QR_URL
        }).catch(() => fallbackShare(text));
      } else {
        fallbackShare(text);
      }
    }

    function fallbackShare(text) {
      const url = 'https://wa.me/?text=' + encodeURIComponent(text);
      window.open(url, '_blank');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
