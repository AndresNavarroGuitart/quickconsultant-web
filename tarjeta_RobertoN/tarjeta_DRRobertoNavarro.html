<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dr. Roberto Navarro — Tarjeta Digital</title>
  <meta name="description" content="Médico Pediatra especialista en Hematología-Oncología" />
  <meta property="og:title" content="Dr. Roberto Navarro" />
  <meta property="og:description" content="Médico Pediatra · Hematología-Oncología · Hospital Infantil Municipal" />
  <meta property="og:image" content="foto_roberto.jpeg.jpeg" />
  <meta property="og:type" content="profile" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #1976d2;
      --navy:   #0d47a1;
      --grad:   linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
      --dark:   #0a1628;
      --text:   #1a2540;
      --muted:  #6b7280;
      --light:  #f5f8ff;
      --white:  #ffffff;
      --border: #e8eef8;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 520px; height: 520px;
      top: -150px; right: -150px;
      background: linear-gradient(135deg, rgba(25,118,210,.10) 0%, rgba(13,71,161,.10) 100%);
    }
    .bg-orb-2 {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      background: linear-gradient(135deg, rgba(25,118,210,.06) 0%, rgba(13,71,161,.06) 100%);
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,.12), 0 4px 16px rgba(25,118,210,.10);
      overflow: visible;
      position: relative;
      z-index: 1;
    }

    /* Gradient header */
    .card-header {
      background: var(--grad);
      border-radius: 28px 28px 0 0;
      padding: 26px 24px 0;
      position: relative;
      min-height: 148px;
    }

    /* Medical cross watermark */
    .med-cross {
      position: absolute;
      pointer-events: none;
      opacity: .07;
    }
    .med-cross-1 { bottom: 20px; right: -10px; width: 120px; height: 120px; }
    .med-cross-2 { top: -10px; right: 60px; width: 70px; height: 70px; opacity: .05; }

    /* Stethoscope watermark */
    .med-steth {
      position: absolute;
      top: 12px; right: 16px;
      width: 52px; height: 52px;
      opacity: .13;
      pointer-events: none;
    }

    /* Dot grid decoration */
    .dot-grid {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(6, 6px);
      gap: 7px;
      pointer-events: none;
    }
    .dot-grid span {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      display: block;
    }
    .dots-tr { top: 20px; right: 72px; }
    .dots-bl { bottom: 40px; left: 18px; opacity: .5; }

    /* Plus decorations — medical crosses */
    .plus {
      position: absolute;
      font-weight: 300;
      color: rgba(255,255,255,.35);
      font-size: 1.6rem;
      line-height: 1;
      pointer-events: none;
    }
    .plus-1 { top: 18px; left: 24px; }
    .plus-2 { bottom: 50px; right: 22px; }

    /* White wave */
    .card-wave { background: var(--grad); }
    .card-wave-inner {
      background: var(--white);
      border-radius: 50% 50% 0 0 / 44px 44px 0 0;
      height: 44px;
    }

    /* Avatar */
    .avatar-wrap {
      position: absolute;
      bottom: -148px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }
    .avatar-ring {
      width: 232px; height: 232px;
      border-radius: 50%;
      background: var(--grad);
      padding: 4px;
      box-shadow: 0 10px 36px rgba(25,118,210,.40);
    }
    .avatar-ring-inner {
      width: 224px; height: 224px;
      border-radius: 50%;
      background: var(--white);
      padding: 4px;
      overflow: hidden;
    }
    .avatar-ring-inner img {
      width: 216px; height: 216px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .avatar-initials {
      width: 216px; height: 216px;
      border-radius: 50%;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      letter-spacing: .02em;
    }

    /* Card body */
    .card-body {
      background: var(--white);
      border-radius: 0 0 28px 28px;
      padding: 120px 28px 14px;
      text-align: center;
    }

    /* Medical badge under name */
    .med-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, rgba(25,118,210,.10) 0%, rgba(13,71,161,.10) 100%);
      border: 1px solid rgba(25,118,210,.2);
      border-radius: 100px;
      padding: 4px 12px;
      margin-bottom: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .med-badge svg {
      width: 12px; height: 12px;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 1.45rem;
      font-weight: 900;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .card-role {
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 10px 0;
    }

    /* Contact rows */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
      margin-bottom: 4px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 13px;
      border-radius: 13px;
      background: var(--light);
      text-decoration: none;
      color: var(--text);
      border: 1.5px solid transparent;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .contact-item:hover {
      background: #eef4ff;
      border-color: rgba(25,118,210,.25);
      transform: translateX(3px);
    }
    .contact-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg { width: 16px; height: 16px; }
    .contact-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      line-height: 1;
      margin-bottom: 3px;
    }
    .contact-value {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 14px 20px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity .2s, transform .2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--grad);
      color: white;
      box-shadow: 0 6px 20px rgba(25,118,210,.35);
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Icon row */
    .icon-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    .icon-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      transition: border-color .2s, color .2s, transform .2s;
      flex-shrink: 0;
    }
    .icon-btn svg { width: 20px; height: 20px; }
    .icon-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      transform: translateY(-2px);
    }

    /* QR */
    .qr-section { margin-top: 10px; }
    .qr-box {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 18px 0 4px;
      gap: 10px;
      animation: fadeIn .25s ease;
    }
    .qr-box.visible { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    #qrcode {
      border-radius: 14px;
      overflow: hidden;
      padding: 10px;
      background: white;
      border: 1.5px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
    }
    .qr-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      text-align: center;
    }

    /* Footer */
    .card-footer {
      padding: 10px 28px 14px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .card-footer p {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark);
      color: white;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      z-index: 999;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="bg-orb bg-orb-1"></div>

            />

          </div>
        </div>
      </div>
    </div>

    <!-- Wave -->
    <div class="card-wave">
      <div class="card-wave-inner"></div>
    </div>

    <!-- ── Card Body ── -->
    <div class="card-body">

      <h1 class="card-name">Dr. Roberto Navarro</h1>
      <p class="card-role">Médico Pediatra · Hematología-Oncología<br>Jefe de Servicio · Hospital Infantil Municipal</p>

      <div class="divider"></div>

      <ul class="contact-list">
        <li>
          <a class="contact-item" href="mailto:robertognavarrog8@gmail.com">
            <div class="contact-icon">

                <rect x="2" y="4" width="20" height="16" rx="2"/>

              </svg>
            </div>

              <span class="contact-label">Email</span>
              <span class="contact-value">robertognavarrog8@gmail.com</span>

        <li>
          <a class="contact-item" href="https://wa.me/5493513344810" target="_blank" rel="noopener">

              <svg viewBox="0 0 24 24" fill="white" stroke="none">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>

      <div class="divider"></div>

      <div class="btn-group">

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const QR_URL = 'https://andresnavarroguitart.github.io/quickconsultant-web/tarjeta_RobertoN/tarjeta_DRRobertoNavarro.html';
    let qrGenerated = false;

    function toggleQR() {
      const box = document.getElementById('qr-box');
      const btn = document.getElementById('qr-btn');
      box.classList.toggle('visible');
      const qrIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/></svg>`;
      if (box.classList.contains('visible')) {
        btn.innerHTML = qrIcon + ' Ocultar QR';
        if (!qrGenerated) {
          new QRCode(document.getElementById('qrcode'), {
            text: QR_URL,
            width: 180,
            height: 180,
            colorDark: '#0d47a1',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
          qrGenerated = true;
        }
      } else {
        btn.innerHTML = qrIcon + ' Mostrar QR';
      }
    }

    function saveContact() {
      const vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Dr. Roberto Navarro',
        'N:Navarro;Roberto;;;Dr.',
        'TITLE:Médico Pediatra · Hematología-Oncología · Jefe de Servicio HIM',
        'TEL;TYPE=CELL,VOICE:+5493513344810',
        'EMAIL;TYPE=INTERNET:robertognavarrog8@gmail.com',
        'URL:https://www.linkedin.com/in/roberto-navarro-guitart-39217a269/',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = 'Dr_Roberto_Navarro.vcf';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Contacto descargado ✓');
    }

    function shareCard() {
      const text = '👋 Te comparto mi tarjeta digital\n\n' +
        'Dr. Roberto Navarro\n' +
        'Médico Pediatra · Hematología-Oncología\n' +
        'Jefe de Servicio · Hospital Infantil Municipal';

      if (navigator.share) {
        navigator.share({
          title: 'Dr. Roberto Navarro',
          text: text,
          url: window.location.href !== 'about:blank' ? window.location.href : QR_URL
        }).catch(() => fallbackShare(text));
      } else {
        fallbackShare(text);
      }
    }

    function fallbackShare(text) {
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
